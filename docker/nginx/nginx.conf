# Affirm - Nginx 反向代理配置
# 作用：SSL 终止 + Telegram Webhook 转发
#
# 使用前提：
#   1. 将 SSL 证书放置于 docker/nginx/ssl/cert.pem 和 docker/nginx/ssl/key.pem
#   2. 修改 server_name 为实际域名
#   3. 确保 Node.js 应用在 WEBHOOK_PORT（默认 3002）监听
#
# 在 docker-compose.yml 中启用 nginx 服务后，执行：
#   docker-compose up -d nginx

upstream affirm_webhook {
    # Docker Compose 内部服务名 app，端口与 WEBHOOK_PORT 一致
    server app:3002;
    keepalive 16;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（Let's Encrypt 或自签名）
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # 推荐的 SSL 安全配置
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Telegram Webhook 端点
    # Telegram 服务器 IP 段（可选，增强安全性）：
    #   149.154.160.0/20, 91.108.4.0/22
    location /webhook {
        proxy_pass         http://affirm_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Telegram 请求体一般不超过 4MB
        client_max_body_size 4m;
        proxy_read_timeout   30s;
    }

    # 健康检查（供监控系统使用）
    location /health {
        proxy_pass         http://affirm_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # 拒绝其他所有路径
    location / {
        return 404;
    }
}
