version: '3.8'

services:
  # Redis 服务（BullMQ 持久化队列）
  redis:
    image: redis:7-alpine
    container_name: affirm_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL + pgvector 数据库服务
  # 使用 pgvector/pgvector:pg15 镜像，内置 pgvector 扩展（修复 8.3）
  postgres:
    image: pgvector/pgvector:pg15
    container_name: affirm_postgres
    environment:
      POSTGRES_DB: affirm_db
      POSTGRES_USER: affirm_user
      # 密码从环境变量读取，不再硬编码（修复 8.1）
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/database/schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affirm_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 应用服务
  app:
    build: .
    container_name: affirm_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # DB_URL 通过环境变量引用 POSTGRES_PASSWORD（修复 8.1）
      DB_URL: postgresql://affirm_user:${POSTGRES_PASSWORD}@postgres:5432/affirm_db
    ports:
      - "3001:3001"
      - "3002:3002"
    # 移除全目录挂载（修复 8.2）：生产环境代码通过 Dockerfile COPY 进入镜像
    # 如需开发热重载，使用 docker-compose.dev.yml 覆盖此配置
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "if (process.env.WEBHOOK_ENABLED === 'true') { const http = require('http'); http.get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1)); } else { process.exit(0); }"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
