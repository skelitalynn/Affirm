version: '3.8'

services:
  # PostgreSQL数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: affirm_postgres
    environment:
      POSTGRES_DB: affirm_db
      POSTGRES_USER: affirm_user
      POSTGRES_PASSWORD: your_database_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affirm_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # pgvector扩展（需要自定义构建）
  # 注意：postgres:15-alpine默认不包含pgvector，需要自定义镜像
  
  # 应用服务
  app:
    build: .
    container_name: affirm_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_URL: postgresql://affirm_user:your_database_password@postgres:5432/affirm_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选：Redis缓存
  redis:
    image: redis:7-alpine
    container_name: affirm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
